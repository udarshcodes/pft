{% extends "layout.html" %}

{% block title %}Add Transaction{% endblock %}

{% block main %}
    <h2 class="mb-4">Add Transaction</h2>
    <form action="/add" method="post" class="mx-auto" style="max-width: 500px;">
        <div class="mb-3">
            <label for="type" class="form-label">Type</label>
            <select class="form-select" name="type" id="type" required>
                <option value="">Select type...</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>



        <div class="mb-3">
            <label for="amount" class="form-label">Amount</label>
            <div class="input-group">
                <span class="input-group-text">{{ session.get('currency', 'USD') }}</span>
                <input type="number" step="0.01" class="form-control" id="amount" name="amount" placeholder="0.00" min="0.01" required>
            </div>
        </div>

        <div class="mb-3">
            <label for="category" class="form-label">Category</label>
            <input type="text" class="form-control" id="category" name="category" list="categories" required>
            <datalist id="categories">
                {% for category in categories %}
                    <option value="{{ category }}">{{ category }}</option>
                {% endfor %}
            </datalist>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description (optional)</label>
            <input type="text" class="form-control" id="description" name="description">
        </div>

        <div class="mb-3">
            <label for="date" class="form-label">Date</label>
            <input type="date" class="form-control" id="date" name="date">
        </div>

        <button class="btn btn-primary w-100" type="submit">Add Transaction</button>
    </form>
{% endblock %}
