{% extends "layout.html" %}

{% block title %}Register{% endblock %}

{% block main %}
    <h2 class="mb-4">Register</h2>
    <form action="/register" method="post" class="mx-auto" style="max-width: 400px;">
        <div class="mb-3">
            <label for="username" class="form-label visually-hidden">Username</label>
            <input autocomplete="username" autofocus required class="form-control" id="username" name="username" placeholder="Username" type="text">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label visually-hidden">Password</label>
            <input autocomplete="new-password" required class="form-control" id="password" name="password" placeholder="Password" type="password">
        </div>
        <div class="mb-3">
            <label for="confirmation" class="form-label visually-hidden">Confirm Password</label>
            <input autocomplete="new-password" required class="form-control" id="confirmation" name="confirmation" placeholder="Confirm Password" type="password">
        </div>
        <button class="btn btn-primary w-100" type="submit">Register</button>
    </form>
    <div class="text-center mt-3">
        <p>Already have an account? <a href="/login">Log in here</a></p>
    </div>
{% endblock %}
