{% extends "layout.html" %}

{% block title %}Settings{% endblock %}

{% block main %}
    <h2 class="mb-4 text-center">User Settings</h2>

    <div class="row justify-content-center g-5">

        <div class="col-md-5">
            <h4 class="mb-3">Change Password</h4>
            <form action="/change_password" method="post">
                <div class="mb-4">
                    <input class="form-control" name="current_password" type="password" placeholder="Current Password" required>
                </div>
                <div class="mb-4">
                    <input class="form-control" name="new_password" type="password" placeholder="New Password" required>
                </div>
                <div class="mb-3">
                    <input class="form-control" name="confirm_password" type="password" placeholder="Confirm New Password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Update Password</button>
            </form>
        </div>

        <div class="col-md-5">
            <h4 class="mb-3">General Settings</h4>
            <form action="/settings" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" value="{{ user.username }}" disabled>
                </div>
                <div class="mb-3">
                    <label for="currency" class="form-label">Currency</label>
                    <select class="form-select" name="currency" id="currency">
                        <option value="AUD" {% if user.currency == 'AUD' %}selected{% endif %}>Australian Dollar (AUD)</option>
                        <option value="CAD" {% if user.currency == 'CAD' %}selected{% endif %}>Canadian Dollar (CAD)</option>
                        <option value="EUR" {% if user.currency == 'EUR' %}selected{% endif %}>Euro (EUR)</option>
                        <option value="GBP" {% if user.currency == 'GBP' %}selected{% endif %}>British Pound (GBP)</option>
                        <option value="INR" {% if user.currency == 'INR' %}selected{% endif %}>Indian Rupee (INR)</option>
                        <option value="JPY" {% if user.currency == 'JPY' %}selected{% endif %}>Japanese Yen (JPY)</option>
                        <option value="NZD" {% if user.currency == 'NZD' %}selected{% endif %}>New Zealand Dollar (NZD)</option>
                        <option value="SGD" {% if user.currency == 'SGD' %}selected{% endif %}>Singapore Dollar (SGD)</option>
                        <option value="KRW" {% if user.currency == 'KRW' %}selected{% endif %}>South Korean Won (KRW)</option>
                        <option value="CHF" {% if user.currency == 'CHF' %}selected{% endif %}>Swiss Franc (CHF)</option>
                        <option value="USD" {% if user.currency == 'USD' %}selected{% endif %}>US Dollar (USD)</option>
                    </select>
                </div>
                <button class="btn btn-primary w-100" type="submit">Save Settings</button>
            </form>
        </div>
    </div>
{% endblock %}
